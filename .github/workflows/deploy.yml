name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          rm -rf /tmp/prompt-workbench-gh-pages
          git worktree add /tmp/prompt-workbench-gh-pages origin/gh-pages
          rsync -a --delete --exclude=".git" --exclude=".DS_Store" dist/ /tmp/prompt-workbench-gh-pages/
          touch /tmp/prompt-workbench-gh-pages/.nojekyll
          cd /tmp/prompt-workbench-gh-pages
          git add -A
          git commit -m "Deploy GitHub Pages from ${GITHUB_SHA::7}" || exit 0
          git push origin HEAD:gh-pages
