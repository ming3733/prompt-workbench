<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提示词收录</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="brand"><img class="mark" src="icons/sparkle-highlight.svg" alt="" /><div><strong>提示词收录</strong><small>网页灵感快存</small></div></div>
      <div class="source"><span class="source-label">当前网页</span><strong id="page-title">读取中...</strong><small id="page-url"></small></div>
      <label class="field"><span>标题</span><div class="title-row"><input id="title" placeholder="可留空，让 AI 生成" /><button class="small-button" id="ai-title">AI 标题</button></div></label>
      <label class="field field-dropdown"><span>类型</span>
        <div class="custom-select" id="type-select">
          <input type="hidden" id="type" value="UI提示词" />
          <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"><span id="type-label">UI提示词</span><i></i></button>
          <div class="custom-select-menu" role="listbox">
            <button class="custom-select-option is-selected" type="button" role="option" aria-selected="true" data-value="UI提示词">UI提示词</button>
            <button class="custom-select-option" type="button" role="option" aria-selected="false" data-value="图片提示词">图片提示词</button>
            <button class="custom-select-option" type="button" role="option" aria-selected="false" data-value="icon提示词">icon提示词</button>
            <button class="custom-select-option" type="button" role="option" aria-selected="false" data-value="视频提示词">视频提示词</button>
          </div>
        </div>
      </label>
      <label class="field"><span>标签</span><input id="tags" placeholder="例如：UI 设计，参考图" /><small class="field-note">逗号/顿号分隔，自动去重</small></label>
      <label class="field"><span>内容</span><textarea id="content" placeholder="输入或粘贴提示词..."></textarea></label>
      <div class="image-box" id="image-box"><div class="image-empty"><span>图片</span><small>粘贴图片；已有图片会替换</small></div><img id="image-preview" alt="已粘贴图片" hidden /><button class="remove-image" id="remove-image" title="删除图片" hidden>删除图片</button></div>
      <button class="primary" id="collect">保存并同步到提示词库</button>
      <div class="sync-panel">
        <div class="sync-status"><strong id="queued-count">待同步 0 条</strong><span id="history-count">本机已保存 0 条</span></div>
        <button class="secondary" id="sync">同步到线上库</button>
        <button class="secondary" id="open">打开线上提示词库</button>
        <button class="ghost" id="backup">复制备份 JSON</button>
      </div>
      <p class="hint" id="selection-hint">当前网页：读取中...</p>
      <div class="message" id="message" role="status"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
